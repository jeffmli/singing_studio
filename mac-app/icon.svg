<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2018"/>
      <stop offset="0.55" stop-color="#160f0b"/>
      <stop offset="1" stop-color="#0c0807"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#f5a524" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#f5a524" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ffd591"/>
      <stop offset="0.45" stop-color="#f5a524"/>
      <stop offset="1" stop-color="#d4830f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc878"/>
      <stop offset="1" stop-color="#cf8214"/>
    </linearGradient>
    <filter id="micGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="round"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
  </defs>

  <!-- Rounded-square app tile -->
  <g clip-path="url(#round)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#glow)"/>
    <!-- subtle stage spotlight cone -->
    <path d="M512 120 L760 470 L264 470 Z" fill="#f5a524" opacity="0.06"/>
  </g>
  <!-- inner hairline for depth -->
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- amber glow puddle behind mic -->
  <ellipse cx="512" cy="430" rx="150" ry="180" fill="#f5a524" opacity="0.20" filter="url(#micGlow)"/>

  <!-- Microphone -->
  <g filter="url(#softShadow)">
    <!-- cradle / yoke -->
    <path d="M360 422 v44 a152 152 0 0 0 304 0 v-44"
          fill="none" stroke="url(#metal)" stroke-width="30" stroke-linecap="round"/>
    <!-- stand -->
    <rect x="496" y="612" width="32" height="116" rx="10" fill="url(#metal)"/>
    <!-- base -->
    <rect x="404" y="716" width="216" height="34" rx="17" fill="url(#metal)"/>

    <!-- capsule body -->
    <rect x="420" y="250" width="184" height="300" rx="92" fill="url(#mic)"/>
    <!-- glossy highlight -->
    <rect x="446" y="276" width="44" height="150" rx="22" fill="#ffffff" opacity="0.28"/>
    <!-- grille lines -->
    <g stroke="#7a4a0c" stroke-opacity="0.55" stroke-width="13" stroke-linecap="round">
      <line x1="452" y1="322" x2="572" y2="322"/>
      <line x1="452" y1="372" x2="572" y2="372"/>
      <line x1="452" y1="422" x2="572" y2="422"/>
      <line x1="452" y1="472" x2="572" y2="472"/>
    </g>
  </g>
</svg>
